name: Sync and Compile CV
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows you to click "Run" manually

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Website Repo
        uses: actions/checkout@v4

      - name: Clone Overleaf Project
        run: |
          # Clones to a temp folder so source files aren't tracked
          git clone https://${{ secrets.OVERLEAF_EMAIL }}:${{ secrets.OVERLEAF_TOKEN }}@git.overleaf.com/${{ secrets.OVERLEAF_PROJECT_ID }} overleaf_temp
        
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: overleaf_temp/industry_science_cv.tex
          working_directory: overleaf_temp
      
      - name: Move PDF and Cleanup
        run: |
          mkdir -p assets
          cp overleaf_temp/industry_science_cv.pdf ./assets/cv.pdf
          rm -rf overleaf_temp

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./assets/cv.pdf
          git commit -m "Update CV from Overleaf" || exit 0
          git push
